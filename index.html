            const inputVal = document.getElementById('chain-search-input').value.trim();
            const btn = document.getElementById('ai-analyze-btn');
            const brainPanel = document.getElementById('chain-ai-brain');
            const brainTitle = document.getElementById('brain-comp-name');
            const brainText = document.getElementById('brain-comp-text');
            const container = document.getElementById('chain-flow-container');
            
            if (!inputVal) { alert("請輸入想要剖析的產業或技術主題（例如：低軌衛星、液冷）"); return; }
            
            btn.disabled = true;
            btn.className = "px-5 py-3 bg-gray-400 dark:bg-gray-700 text-gray-200 text-sm font-bold rounded-xl shadow-md cursor-not-allowed";
            btn.innerText = "分析中...";

            brainPanel.classList.remove('hidden');
            brainTitle.innerText = `🔍 正在現場動態生成『${inputVal}』的上中下游全球供應鏈...`;
            brainText.innerHTML = `<span class='animate-pulse text-purple-500 font-bold text-xs'>⚡ 本地端 Llama 3.1 正在功能推理並編織知識圖譜，顯卡正在運作，請稍候...</span>`;
            
            try {
                const response = await fetch(`${NGROK_TUNNEL_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Quant-Key': SHENG_SECRET_KEY },
                    body: JSON.stringify({ query: inputVal })
                });
                
                const resData = await response.json();
                if (!response.ok || !resData.chains) { throw new Error(); }
                
                brainTitle.innerText = `🧠 ${inputVal} — 全球產業量化核心戰略解讀`;
                brainText.className = "text-xs text-gray-700 dark:text-gray-300 leading-relaxed font-mono whitespace-pre-line";
                brainText.innerText = resData.summary;
                
                container.innerHTML = "";
                container.className = "grid grid-cols-1 md:grid-cols-3 gap-3 flex-1 overflow-hidden";
                
                const colors = { "上游": "from-red-500 to-orange-500", "中游": "from-amber-500 to-yellow-500", "下游": "from-blue-500 to-indigo-500" };
                
                resData.chains.forEach((node, idx) => {
                    let cardsHtml = "";
                    node.companies.forEach(c => {
                        cardsHtml += `
                            <div class="p-2.5 rounded-lg border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-950/40 shadow-sm border-l-4 border-l-purple-500 flex flex-col justify-between mb-2">
                                <div class="flex justify-between items-center mb-0.5">
                                    <span class="font-bold text-gray-800 dark:text-gray-100 text-xs truncate max-w-[120px]">${c.name}</span>
                                    ${c.id ? `<span class="font-mono text-[9px] text-gray-400 bg-gray-100 dark:bg-gray-800 px-1 py-0.2 rounded">${c.id}</span>` : ''}
                                </div>
                                <p class="text-[10px] text-gray-500 dark:text-gray-400 leading-relaxed">${c.desc}</p>
                            </div>
                        `;
                    });
                    
                    const nodeColor = colors[node.stage] || "from-purple-500 to-pink-500";
                    const colDiv = document.createElement('div');
                    colDiv.className = "flex flex-col bg-white/60 dark:bg-gray-900/40 border border-gray-200 dark:border-gray-800/80 rounded-xl p-3 shadow-md h-full";
                    colDiv.innerHTML = `
                        <div class="flex items-center gap-2 mb-2 border-b border-gray-200 dark:border-gray-800 pb-1.5 flex-shrink-0">
                            <span class="w-5 h-5 rounded-full bg-gradient-to-r ${nodeColor} text-white flex items-center justify-center font-bold text-[10px] shadow-sm">${idx + 1}</span>
                            <h3 class="text-xs font-bold text-gray-800 dark:text-gray-100">${node.stage} <span class="text-[10px] font-normal text-gray-400 ml-1">${node.title}</span></h3>
                        </div>
                        <div class="space-y-2 flex-1 overflow-y-auto pr-1 max-h-[320px] md:max-h-[380px]">${cardsHtml}</div>
                    `;
                    container.appendChild(colDiv);
                });
                
            } catch (err) {
                brainText.innerHTML = "<span class='text-red-500 font-bold text-xs'>❌ 數據串接異常：請確認本機 api_server.py 是否正常開機運作。</span>";
            } finally {
                btn.disabled = false;
                btn.className = "px-5 py-3 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-xl shadow-md transition duration-200";
                btn.innerText = "即時 AI 分析";
            }
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            const themes = {
                'tw': { title: "📊 台股大數據資料來源", btn: 'from-green-500 to-emerald-600', border: 'border-emerald-500/30', text: 'text-emerald-500 dark:text-emerald-400' },
                'us': { title: "🦅 美股科技巨頭晚報資料來源", btn: 'from-blue-500 to-indigo-600', border: 'border-blue-500/30', text: 'text-blue-500 dark:text-blue-400' },
                'global': { title: "🌍 國際政經與環球情報資料來源", btn: 'from-purple-500 to-pink-600', border: 'border-purple-500/30', text: 'text-purple-500 dark:text-purple-400' }
            };
            
            const mainPanel = document.getElementById('main-panel');
            if (!mainPanel) return;

            document.querySelectorAll('.tab-btn').forEach(b => {
                b.className = "tab-btn px-4 py-2 rounded-xl font-medium text-xs text-gray-500 dark:text-gray-400 bg-gray-200/70 dark:bg-gray-800/40 border border-gray-300 dark:border-gray-700/50 hover:bg-gray-300/60 dark:hover:bg-gray-800/80 transition-all duration-200";
            });
            
            const t = themes[tabId] || themes['tw'];
            const activeBtn = document.getElementById('btn-'+tabId);
            if (activeBtn) activeBtn.className = `tab-btn px-5 py-2 rounded-xl font-bold text-xs bg-gradient-to-r ${t.btn} text-white shadow-md border-transparent`;
            
            mainPanel.className = `bg-white/90 dark:bg-gray-900/70 backdrop-blur-xl p-4 md:p-5 rounded-xl border border-gray-200 dark:border-gray-800/80 shadow-md transition-all duration-300`;
            
            const titleEl = document.getElementById('panel-title');
            const timeEl = document.getElementById('panel-time');
            const tabData = dbData[tabId] || { "time": "尚未更新", "data": [] };

            if (titleEl) {
                titleEl.className = "text-sm font-bold text-gray-800 dark:text-gray-200";
                titleEl.innerText = t.title;
            }
            if (timeEl) timeEl.innerText = "UPDATE: " + tabData.time;
            
            const container = document.getElementById('link-list');
            if (!container) return;
            container.innerHTML = "";
            
            (tabData.data || []).slice(0, 8).forEach(item => {
                const li = document.createElement('li');
                li.className = "p-2.5 bg-gray-50/50 dark:bg-gray-800/20 rounded-lg border border-gray-200 dark:border-gray-700/30 text-xs flex flex-col gap-0.5 hover:border-gray-300 dark:hover:border-gray-600 transition-colors shadow-sm group";
                li.innerHTML = `
                    <div class="text-gray-700 dark:text-gray-300 font-medium truncate">📌 新聞：${item.title}</div>
                    <a href="${item.url}" target="_blank" class="text-[10px] font-mono text-gray-400 block truncate group-hover:${t.text} transition-colors">
                        ${item.url}
                    </a>
                `;
                container.appendChild(li);
            });
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const modeText = document.getElementById('mode-text');
            if (theme === 'dark') {
                html.classList.add('dark');
                document.body.className = "theme-dark text-gray-100 min-h-screen flex flex-col justify-between overflow-hidden";
                if(modeText) modeText.innerText = "亮色 ☀️";
            } else {
                html.classList.remove('dark');
                document.body.className = "theme-light text-gray-900 min-h-screen flex flex-col justify-between overflow-hidden";
                if(modeText) modeText.innerText = "暗黑 🌙";
            }
        }

        function toggleDarkMode() {
            const currentTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
            
            if (activeView === 'news') switchTab(activeTabId);
            if (activeView === 'ainews') renderAiNews();
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('-translate-x-full'); 
            document.getElementById('sidebar-backdrop').classList.toggle('hidden'); 
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            switchTab('tw');
        });
    </script>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-hidden">
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 dark:bg-black/70 backdrop-blur-sm z-40 hidden"></div>
    
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-56 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-50 transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center"><h2 class="text-base font-black font-mono text-purple-600">QUANT_MENU</h2></div>
        <nav class="flex-1 p-3 space-y-2">
            <button id="menu-news" onclick="changeView('news')" class="w-full text-left px-3 py-2 rounded-xl font-bold text-xs text-blue-600 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/40">📊 新聞情報中心</button>
            <button id="menu-chain" onclick="changeView('chain')" class="w-full text-left px-3 py-2 rounded-xl font-medium text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors">🔗 AI 供應鏈地圖</button>
            <button id="menu-ainews" onclick="changeView('ainews')" class="w-full text-left px-3 py-2 rounded-xl font-medium text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors">🧠 AI 新聞戰略中心</button>
        </nav>
        <div class="p-3 border-t border-gray-200 dark:border-gray-800 text-[10px] text-gray-400 font-mono text-center">v1.4.0 LiveNews</div>
    </aside>

    <div class="w-full flex justify-between items-center px-4 py-2 border-b border-gray-200 dark:border-gray-800/80 bg-white/70 dark:bg-gray-900/40 backdrop-blur-md sticky top-0 z-30">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="p-1.5 rounded-lg border border-gray-300 dark:border-gray-700 text-xs hover:bg-gray-100 dark:hover:bg-gray-800/50">☰</button>
            <div class="inline-flex items-center gap-1.5 px-2.5 py-0.5 bg-purple-500/10 border border-purple-500/30 rounded-full text-purple-500 dark:text-purple-400 text-[10px] font-mono">
                <span class="w-1.5 h-1.5 rounded-full bg-purple-500 pulse-light"></span>QUANT_CORE_LIVE
            </div>
        </div>
        <button onclick="toggleDarkMode()" id="mode-text" class="px-2.5 py-1 rounded-lg border border-gray-300 dark:border-gray-700 text-[11px] hover:bg-gray-100 dark:hover:bg-gray-800/50">亮色 ☀️</button>
    </div>

    <div class="max-w-5xl mx-auto w-full px-4 py-3 flex-1 flex flex-col justify-start overflow-hidden">
        <header class="text-center mb-4 flex-shrink-0">
            <h1 class="text-xl font-black font-mono tracking-wider text-gray-800 dark:text-transparent dark:bg-clip-text dark:bg-gradient-to-r dark:from-gray-100 dark:via-gray-200 dark:to-gray-300">QUANT_ROOM <span class="text-purple-500 font-light">v1.4.0</span></h1>
        </header>

        <div id="news-section" class="space-y-4">
            <nav class="flex justify-center space-x-2 mb-2">
                <button id="btn-tw" onclick="switchTab('tw')" class="tab-btn">📊 台股大數據</button>
                <button id="btn-us" onclick="switchTab('us')" class="tab-btn">🦅 美股焦點</button>
                <button id="btn-global" onclick="switchTab('global')" class="tab-btn">🌍 國際政經</button>
            </nav>
            <main id="main-panel" class="p-4 rounded-xl min-h-[300px]">
                <div class="flex justify-between border-b border-gray-200 dark:border-gray-800 pb-2 mb-3">
                    <h2 id="panel-title" class="text-xs font-bold text-gray-400">載入中...</h2>
                    <span id="panel-time" class="text-[10px] font-mono text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-950/50 px-2 py-0.5 rounded">--</span>
                </div>
                <ul id="link-list" class="space-y-2 max-h-[320px] overflow-y-auto"></ul>
            </main>
        </div>

        <div id="chain-section" class="space-y-3 hidden flex-1 overflow-hidden">
            <div class="max-w-xl mx-auto flex gap-2 flex-shrink-0 w-full">
                <input type="text" id="chain-search-input" placeholder="輸入你想探索的全球產業 (如：低軌衛星、防災科技、液冷)..." 
                       class="flex-1 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-800 rounded-xl focus:outline-none focus:ring-1 focus:ring-purple-500 text-xs text-gray-700 dark:text-gray-300">
                <button id="ai-analyze-btn" onclick="triggerRealtimeAiAnalysis()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold rounded-xl shadow-md transition duration-200">即時 AI 分析</button>
            </div>

            <div id="chain-ai-brain" class="hidden p-3 bg-gradient-to-r from-purple-900/10 to-indigo-900/10 border border-purple-500/20 rounded-xl flex-shrink-0">
                <div class="text-purple-500 dark:text-purple-400 font-bold mb-1 text-[11px] font-mono">🧠 <span id="brain-comp-name"></span></div>
                <p id="brain-comp-text" class="text-[11px] leading-normal font-mono text-gray-600 dark:text-gray-300 whitespace-pre-line"></p>
            </div>

            <div id="chain-flow-container" class="flex-1 overflow-y-auto"></div>
        </div>

        <div id="chart-section" class="hidden"></div> <div id="ainews-section" class="hidden flex-1 flex-col overflow-hidden h-full">
            <main class="p-4 bg-white/90 dark:bg-gray-900/70 backdrop-blur-xl rounded-xl border border-gray-200 dark:border-gray-800/80 shadow-md flex flex-col flex-1 overflow-hidden h-[440px] md:h-[calc(100vh-170px)]">
                <div class="flex justify-between border-b border-gray-200 dark:border-gray-800 pb-2 mb-3 flex-shrink-0">
                    <h2 id="ainews-title" class="text-sm font-bold bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">🧠 AI 焦點戰略日報</h2>
                    <span id="ainews-time" class="text-[10px] font-mono text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-950/50 px-2 py-0.5 rounded">--</span>
                </div>
                <div id="ainews-container" class="flex-1 overflow-y-auto font-mono text-xs text-gray-700 dark:text-gray-300 leading-relaxed pr-2 whitespace-pre-line tracking-wide selection:bg-purple-500/30">
                    載入中...
                </div>
            </main>
        </div>

    </div>
    <footer class="py-2 text-center text-gray-400 dark:text-gray-600 text-[9px] font-mono uppercase flex-shrink-0">// ONE_PAGE_DASHBOARD_MODE // LONE_LLAMA_AGENT_V1</footer>
</body>
</html>
