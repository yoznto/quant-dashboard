        function switchAiTab(subTabId) {

            document.getElementById('ai-btn-tw').className = "ai-tab-btn px-4 py-2 rounded-xl font-medium text-xs text-gray-500 dark:text-gray-400 bg-gray-200/70 dark:bg-gray-800/40 border border-gray-300 dark:border-gray-700/50 hover:bg-gray-300/60 dark:hover:bg-gray-800/80 transition-all duration-200 shadow-sm";
            document.getElementById('ai-btn-us').className = "ai-tab-btn px-4 py-2 rounded-xl font-medium text-xs text-gray-500 dark:text-gray-400 bg-gray-200/70 dark:bg-gray-800/40 border border-gray-300 dark:border-gray-700/50 hover:bg-gray-300/60 dark:hover:bg-gray-800/80 transition-all duration-200 shadow-sm";

            let targetKey = "ai_news_tw";
            if (subTabId === 'tw') { document.getElementById('ai-btn-tw').className = "ai-tab-btn px-5 py-2 rounded-xl font-bold text-xs bg-gradient-to-r from-green-500 to-emerald-600 text-white shadow-md border-transparent"; targetKey = "ai_news_tw"; }

            const tabData = dbData[targetKey] || { "title": "尚未更新", "time": "尚未更新", "text": "暫無日報資料。" };
            document.getElementById('ainews-title').innerText = tabData.title;
            document.getElementById('ainews-time').innerText = "UPDATE: " + tabData.time;
            
            let text = tabData.text || "";
            let cleanText = text.replace(/==+/g, '').trim(); // 清除 Markdown 粗體等雜質
            
            function extractSection(fullText, sectionTitles) {
                for (let i = 0; i < sectionTitles.length; i++) {
                    let title = sectionTitles[i];
                    let startIdx = fullText.indexOf(title);
                    if (startIdx !== -1) {
                        let contentStart = startIdx + title.length;
                        let markers = ["市場事實如下：", "**市場事實如下：**", "市場事實", "**市場事實**", "**今日市場焦點**", "今日市場焦點", "**操盤策略與投資建議**", "操盤策略與投資建議", "聯準會與總經事實", "**聯準會與總經事實**", "科技巨頭動態事實", "**科技巨頭動態事實**", "亞洲市場 facts", "歐洲與地緣 facts", "原物料與匯率 facts"];
                        let endIdx = fullText.length;
                        markers.forEach(function(marker) {
                            let mIdx = fullText.indexOf(marker, contentStart);
                            if (mIdx !== -1 && mIdx < endIdx) { endIdx = mIdx; }
                        });
                        return fullText.substring(contentStart, endIdx).replace(/==+/g, '').trim();
                    }
                }
                return "";
            }

            // 🎯 精準切片：將大模型內容拆分並寫入隱藏的 Shadow DOM
            document.getElementById('shadow-facts').innerText = extractSection(cleanText, ["市場事實如下：", "**市場事實如下：**", "市場事實", "**市場事實**", "聯準會與總經事實", "**聯準會與總經事實**", "科技巨頭動態事實", "**科技巨頭動態事實**", "亞洲市場 facts"]) || cleanText;
            document.getElementById('shadow-focus').innerText = extractSection(cleanText, ["**今日市場焦點**", "今日市場焦點"]) || "未偵測到今日核心焦點段落。";
            document.getElementById('shadow-strategy').innerText = extractSection(cleanText, ["**操盤策略與投資建議**", "操盤策略與投資建議", "📈 **操盤策略與投資建議**", "操盤策略與行動建議", "**操盤策略與行動建議**"]) || "未偵測到操盤策略方針段落。";

            // 強制刷新畫面顯示目前選中的子頁籤
            showAiBlock(activeAiBlock);
        }

        async function triggerRealtimeAiAnalysis() {
            const inputVal = document.getElementById('chain-search-input').value.trim();
            const btn = document.getElementById('ai-analyze-btn');
            const brainPanel = document.getElementById('chain-ai-brain');
            const brainText = document.getElementById('brain-comp-text');
            const container = document.getElementById('chain-flow-container');
            if (!inputVal) { alert("請輸入想要剖析的產業或技術主題（例如：低軌衛星、液冷）"); return; }
            if (!btn || !container) return;
            btn.disabled = true;
            btn.className = "px-5 py-3 bg-gray-400 dark:bg-gray-700 text-gray-200 text-sm font-bold rounded-xl shadow-md cursor-not-allowed";
            btn.innerText = "分析中...";
            if (brainPanel) brainPanel.classList.remove('hidden');
            const brainTitle = document.getElementById('brain-comp-name');
            if (brainTitle) brainTitle.innerText = "🔍 正在現場動態生成『" + inputVal + "』的上中下游全球供應鏈...";
            if (brainText) brainText.innerHTML = "<span class='animate-pulse text-purple-500 font-bold text-xs'>⚡ 本地端 Llama 3.1 正在功能推理並編織知識圖譜...</span>";
            try {
                const response = await fetch(NGROK_TUNNEL_URL + "/api/analyze", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Quant-Key': SHENG_SECRET_KEY },
                    body: JSON.stringify({ query: inputVal })
                });
                const resData = await response.json();
                if (!response.ok || !resData.chains) { throw new Error(); }
                if (brainTitle) brainTitle.innerText = "🧠 " + inputVal + " — 全球產業量化核心戰略解讀";
                if (brainText) {
                    brainText.className = "text-xs text-gray-700 dark:text-gray-300 leading-relaxed font-mono whitespace-pre-line";
                    brainText.innerText = resData.summary;
                }
                container.innerHTML = "";
                container.className = "grid grid-cols-1 md:grid-cols-3 gap-3 flex-1 overflow-hidden";
                const colors = { "上游": "from-red-500 to-orange-500", "中游": "from-amber-500 to-yellow-500", "下游": "from-blue-500 to-indigo-500" };
                resData.chains.forEach(function(node, idx) {
                    let cardsHtml = "";
                    node.companies.forEach(function(c) {
                        let idBadge = c.id ? '<span class="font-mono text-[9px] text-gray-400 bg-gray-100 dark:bg-gray-800 px-1 py-0.2 rounded">' + c.id + '</span>' : '';
                        cardsHtml += '<div class="p-2.5 rounded-lg border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-950/40 shadow-sm border-l-4 border-l-purple-500 flex flex-col justify-between mb-2">' +
                                        '<div class="flex justify-between items-center mb-0.5">' +
                                            '<span class="font-bold text-gray-800 dark:text-gray-100 text-xs truncate max-w-[120px]">' + c.name + '</span>' +
                                            idBadge +
                                        '</div>' +
                                        '<p class="text-[10px] text-gray-500 dark:text-gray-400 leading-relaxed">' + c.desc + '</p>' +
                                     '</div>';
                    });
                    const nodeColor = colors[node.stage] || "from-purple-500 to-pink-500";
                    const colDiv = document.createElement('div');
                    colDiv.className = "flex flex-col bg-white/60 dark:bg-gray-900/40 border border-gray-200 dark:border-gray-800/80 rounded-xl p-3 shadow-md h-full";
                    colDiv.innerHTML = '<div class="flex items-center gap-2 mb-2 border-b border-gray-200 dark:border-gray-800 pb-1.5 flex-shrink-0">' +
                                            '<span class="w-5 h-5 rounded-full bg-gradient-to-r ' + nodeColor + ' text-white flex items-center justify-center font-bold text-[10px] shadow-sm">' + (idx + 1) + '</span>' +
                                            '<h3 class="text-xs font-bold text-gray-800 dark:text-gray-100">' + node.stage + ' <span class="text-[10px] font-normal text-gray-400 ml-1">' + node.title + '</span></h3>' +
                                        '</div>' +
                                        '<div class="space-y-2 flex-1 overflow-y-auto pr-1 max-h-[320px] md:max-h-[380px]">' + cardsHtml + '</div>';
                    container.appendChild(colDiv);
                });
            } catch (err) {
                if (brainText) brainText.innerHTML = "<span class='text-red-500 font-bold text-xs'>❌ 數據串接異常：請確認本機 api_server.py 是否正常開機運作。</span>";
            } finally {
                btn.disabled = false;
                btn.className = "px-5 py-3 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-xl shadow-md transition duration-200";
                btn.innerText = "即時 AI 分析";
            }
        }

                const li = document.createElement('li');

                li.innerHTML = '<div class="text-gray-700 dark:text-gray-300 font-medium truncate">📌 新聞：' + item.title + '</div>' +
                               '<a href="' + item.url + '" target="_blank" class="text-[10px] font-mono text-gray-400 block truncate hover:text-purple-400 transition-colors">' + item.url + '</a>';
                container.appendChild(li);
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            switchTab('tw');
        });
    </script>
