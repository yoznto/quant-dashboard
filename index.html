                    const nodeColor = colors[node.stage] || "from-purple-500 to-pink-500";
                    const stepDiv = document.createElement('div');
                    stepDiv.className = "mb-6 bg-white/70 dark:bg-gradient-to-r dark:from-gray-900/40 dark:to-gray-900/20 border border-purple-500/20 rounded-2xl p-5 shadow-lg border-t-4 border-t-purple-500/40 animate-fadeIn";
                    stepDiv.innerHTML = `
                        <div class="flex items-center gap-3 mb-4 border-b border-gray-100 dark:border-gray-800 pb-2">
                            <span class="w-8 h-8 rounded-full bg-gradient-to-r ${nodeColor} text-white flex items-center justify-center font-bold font-mono text-xs shadow-md">${idx + 1}</span>
                            <h3 class="text-base font-bold text-gray-800 dark:text-gray-100">${node.stage} <span class="text-xs font-normal text-gray-400 ml-2">${node.title}</span></h3>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">${cardsHtml}</div>
                    `;
                    container.appendChild(stepDiv);
                });
                
            } catch (err) {
                brainText.innerHTML = "<span class='text-red-500 font-bold'>❌ 數據串接異常：請確認本機 api_server.py 是否已關閉並重新啟動。</span>";
            }
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            const themes = {
                'tw': { title: "📊 台股大數據資料來源", btn: 'from-green-500 to-emerald-600', border: 'border-emerald-500/30', text: 'text-emerald-500 dark:text-emerald-400' },
                'us': { title: "🦅 美股科技巨頭晚報資料來源", btn: 'from-blue-500 to-indigo-600', border: 'border-blue-500/30', text: 'text-blue-500 dark:text-blue-400' },
                'global': { title: "🌍 國際政經與環球情報資料來源", btn: 'from-purple-500 to-pink-600', border: 'border-purple-500/30', text: 'text-purple-500 dark:text-purple-400' }
            };
            
            // 確保主看板節點存在才繼續執行防呆
            const mainPanel = document.getElementById('main-panel');
            if (!mainPanel) return;

            document.querySelectorAll('.tab-btn').forEach(b => {
                b.className = "tab-btn px-5 py-2.5 rounded-xl font-medium text-gray-500 dark:text-gray-400 bg-gray-200/70 dark:bg-gray-800/40 border border-gray-300 dark:border-gray-700/50 hover:bg-gray-300/60 dark:hover:bg-gray-800/80 transition-all duration-200 shadow-sm";
            });
            
            const t = themes[tabId] || themes['tw'];
            const activeBtn = document.getElementById('btn-'+tabId);
            if (activeBtn) activeBtn.className = `tab-btn px-6 py-2.5 rounded-xl font-bold bg-gradient-to-r ${t.btn} text-white shadow-lg border-transparent`;
            
            mainPanel.className = `bg-white/90 dark:bg-gray-900/70 backdrop-blur-xl p-6 md:p-8 rounded-2xl border border-gray-200 dark:border-gray-800/80 shadow-xl transition-all duration-300`;
            
            const titleEl = document.getElementById('panel-title');
            const timeEl = document.getElementById('panel-time');
            const tabData = dbData[tabId] || { "time": "尚未更新", "data": [] };

            if (titleEl) {
                titleEl.className = `text-xl font-bold bg-gradient-to-r ${t.btn} bg-clip-text text-transparent`;
                titleEl.innerText = t.title;
            }
            if (timeEl) timeEl.innerText = "SYSTEM UPDATE: " + tabData.time;
            
            const container = document.getElementById('link-list');
            if (!container) return;
            container.innerHTML = "";
            
            (tabData.data || []).forEach(item => {
                const li = document.createElement('li');
                li.className = "p-4 bg-gray-50/50 dark:bg-gray-800/30 rounded-xl border border-gray-200 dark:border-gray-700/30 text-sm flex flex-col gap-1 hover:border-gray-300 dark:hover:border-gray-600 transition-colors shadow-sm group";
                li.innerHTML = `
                    <div class="text-gray-700 dark:text-gray-300 font-medium">📌 新聞：${item.title}</div>
                    <a href="${item.url}" target="_blank" class="text-xs font-mono text-gray-400 block truncate group-hover:${t.text} mt-0.5 transition-colors">
                        ${item.url}
                    </a>
                `;
                container.appendChild(li);
            });
        }

        // 👉 抽取為獨立函式：專門負責在網頁最頂層載入 class 樣式
        function applyTheme(theme) {
            const html = document.documentElement;
            const modeText = document.getElementById('mode-text');
            if (theme === 'dark') {
                html.classList.add('dark');
                document.body.className = "theme-dark text-gray-100 min-h-screen flex flex-col justify-between";
                if(modeText) modeText.innerText = "切換亮色模式 ☀️";
            } else {
                html.classList.remove('dark');
                document.body.className = "theme-light text-gray-900 min-h-screen flex flex-col justify-between";
                if(modeText) modeText.innerText = "切換暗黑模式 🌙";
            }
        }

        function toggleDarkMode() {
            const currentTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
            switchTab(activeTabId); // 切換完畢當場聯動重繪分頁
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('-translate-x-full'); 
            document.getElementById('sidebar-backdrop').classList.toggle('hidden'); 
        }

        // 🎯 核心修正：將異步初始化綁定在 DOMContentLoaded，確保 HTML 元件100%載入完畢才執行
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            switchTab('tw'); // 確保節點就緒後，直接觸發首頁資料渲染
        });
    </script>
</head>
<body class="min-h-screen flex flex-col justify-between">
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 dark:bg-black/70 backdrop-blur-sm z-40 hidden transition-opacity duration-300"></div>
    
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-50 transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
        <div class="p-6 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center"><h2 class="text-xl font-black font-mono text-purple-600">QUANT_MENU</h2></div>
        <nav class="flex-1 p-4 space-y-2">
            <button id="menu-news" onclick="changeView('news')" class="w-full text-left px-4 py-3 rounded-xl font-bold text-blue-600 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/40">📊 新聞情報中心</button>
            <button id="menu-chain" onclick="changeView('chain')" class="w-full text-left px-4 py-3 rounded-xl font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors">🔗 AI 供應鏈地圖</button>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-800 text-xs text-gray-400 font-mono text-center">System Ver 1.8.3</div>
    </aside>

    <div class="w-full flex justify-between items-center px-4 md:px-6 py-3 border-b border-gray-200 dark:border-gray-800/80 bg-white/70 dark:bg-gray-900/40 backdrop-blur-md sticky top-0 z-30">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white/80 dark:bg-gray-800/60 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition duration-150">☰</button>
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-purple-500/10 border border-purple-500/30 rounded-full text-purple-600 dark:text-purple-400 text-xs font-mono">
                <span class="w-2 h-2 rounded-full bg-purple-500 pulse-light"></span>QUANT_CORE_ALIVE
            </div>
        </div>
        <button onclick="toggleDarkMode()" id="mode-text" class="px-3 py-1.5 rounded-lg border border-gray-300 dark:bg-gray-800/60 text-xs text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition duration-150">切換亮色模式 ☀️</button>
    </div>

    <div class="max-w-5xl mx-auto w-full p-4 md:p-8 flex-1 mt-2">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold font-mono tracking-wider text-gray-800 dark:text-transparent dark:bg-clip-text dark:bg-gradient-to-r dark:from-gray-100 dark:via-gray-300 dark:to-gray-500">QUANT_ROOM <span class="text-purple-500 font-light">v1.8.3</span></h1>
            <p class="text-xs text-gray-400 dark:text-gray-500 font-mono uppercase tracking-widest mt-1">Universal Industry Chain Mapping Hub</p>
        </header>

        <div id="news-section" class="space-y-6">
            <nav class="flex justify-center space-x-2 md:space-x-3 mb-6">
                <button id="btn-tw" onclick="switchTab('tw')" class="tab-btn">📊 台股大數據</button>
                <button id="btn-us" onclick="switchTab('us')" class="tab-btn">🦅 美股焦點</button>
                <button id="btn-global" onclick="switchTab('global')" class="tab-btn">🌍 國際政經</button>
            </nav>
            <main id="main-panel" class="p-6 rounded-2xl min-h-[400px]">
                <div class="flex justify-between border-b border-gray-200 dark:border-gray-800 pb-3 mb-4">
                    <h2 id="panel-title">載入中...</h2>
                    <span id="panel-time" class="text-xs font-mono text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-950/50 px-2 py-0.5 rounded border border-gray-200 dark:border-gray-800">--</span>
                </div>
                <ul id="link-list" class="space-y-3"></ul>
            </main>
        </div>

        <div id="chain-section" class="space-y-6 hidden">
            <div class="max-w-xl mx-auto flex gap-2">
                <input type="text" id="chain-search-input" placeholder="輸入你想探索的全球產業 (如：低軌衛星、折疊手機、液冷)..." 
                       class="flex-1 px-4 py-3 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm text-gray-700 dark:text-gray-300 shadow-md">
                <button onclick="triggerRealtimeAiAnalysis()" class="px-5 py-3 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-xl shadow-md transition duration-200">即時 AI 分析</button>
            </div>

            <div id="chain-ai-brain" class="hidden p-5 bg-gradient-to-r from-purple-900/10 to-indigo-900/10 border border-purple-500/30 rounded-2xl shadow-xl animate-fadeIn">
                <div class="text-purple-500 dark:text-purple-400 font-bold mb-2 text-sm font-mono">🧠 <span id="brain-comp-name"></span></div>
                <p id="brain-comp-text" class="text-xs md:text-sm leading-relaxed font-mono whitespace-pre-line"></p>
            </div>

            <div id="chain-flow-container" class="space-y-4"></div>
        </div>
    </div>
    <footer class="mt-16 mb-4 text-center text-gray-400 dark:text-gray-600 text-xs font-mono uppercase">// DYNAMIC_KNOWLEDGE_GRAPH_MODE // OLLAMA_LLAMA3.1_SYSTEM</footer>
</body>
</html>
