<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANT ROOM - AI 量化情報戰情室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', 'JetBrains Mono', sans-serif; transition: background 0.3s ease, color 0.3s ease; }
        .theme-dark { background: radial-gradient(circle at 50% 0%, #1a1c29 0%, #0d0e15 100%); }
        .theme-light { background: radial-gradient(circle at 50% 0%, #f4f5f9 0%, #e9ecf5 100%); }
        .pulse-light { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { opacity: 0.4; box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.5); }
            70% { opacity: 1; box-shadow: 0 0 0 8px rgba(168, 85, 247, 0); }
            100% { opacity: 0.4; box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(156, 163, 175, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.7); }
        .dark ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.45); }
        .dark ::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.75); }
    </style>
    <script>
        const dbData = __JSON_STATE__;
        const NGROK_TUNNEL_URL = "https://jigsaw-camisole-dynasty.ngrok-free.dev";
        const SHENG_SECRET_KEY = "ShengGeSecret666";

        const blackwellDefault = [
            { step: 1, stage: "晶圓製造", title: "Foundry", color: "from-red-500 to-orange-500", companies: [{ name: "台積電", id: "2330", desc: "獨家 4NP 先進製程與 CoWoS 封裝核心。" }] },
            { step: 2, stage: "載板 PCB", title: "Substrate", color: "from-amber-500 to-yellow-500", companies: [{ name: "台光電", id: "2383", desc: "高頻高速 CCL 材供應商。" }, { name: "欣興", id: "3037", desc: "ABF 高階載板出貨大廠。" }] },
            { step: 3, stage: "散熱液冷", title: "Cooling", color: "from-emerald-500 to-teal-500", companies: [{ name: "雙鴻", id: "3324", desc: "水冷板與 CDU 全套液冷系統。" }, { name: "奇鋐", id: "3017", desc: "3D VC 與 AI 機櫃散熱方案。" }] },
            { step: 4, stage: "系統組裝", title: "Assembly", color: "from-blue-500 to-indigo-500", companies: [{ name: "鴻海", id: "2317", desc: "NVL72 整機櫃超級代工贏家。" }] }
        ];

        let activeView = 'news';
        let activeTabId = 'tw';
        let activeAiTabId = 'tw';
        let activeAiBlock = 'facts';

        function toggleSidebar() { 
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            if (sidebar) sidebar.classList.toggle('-translate-x-full'); 
            if (backdrop) backdrop.classList.toggle('hidden'); 
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const modeText = document.getElementById('mode-text');
            if (theme === 'dark') {
                html.classList.add('dark');
                document.body.className = "theme-dark text-gray-100 min-h-screen flex flex-col justify-between overflow-hidden";
                if(modeText) modeText.innerText = "亮色 ☀️";
            } else {
                html.classList.remove('dark');
                document.body.className = "theme-light text-gray-900 min-h-screen flex flex-col justify-between overflow-hidden";
                if(modeText) modeText.innerText = "暗黑 🌙";
            }
        }

        function toggleDarkMode() {
            const currentTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
            if (activeView === 'news') switchTab(activeTabId);
            if (activeView === 'ainews') switchAiTab(activeAiTabId);
        }

        function changeView(viewMode) {
            activeView = viewMode;
            const newsSection = document.getElementById('news-section');
            const chainSection = document.getElementById('chain-section');
            const ainewsSection = document.getElementById('ainews-section');
            const pageTitleHeader = document.getElementById('page-title-header');
            
            if (newsSection) newsSection.className = viewMode === 'news' ? "space-y-4 flex-1 flex flex-col overflow-hidden" : "hidden";
            if (chainSection) chainSection.className = viewMode === 'chain' ? "space-y-3 flex flex-col flex-1 overflow-hidden" : "hidden";
            if (ainewsSection) ainewsSection.className = viewMode === 'ainews' ? "space-y-3 flex flex-col flex-1 overflow-hidden h-full" : "hidden";
            
            if (pageTitleHeader) {
                if (viewMode === 'news') pageTitleHeader.innerText = "📊 新聞情報中心";
                if (viewMode === 'chain') pageTitleHeader.innerText = "🔗 AI 供應鏈地圖";
                if (viewMode === 'ainews') pageTitleHeader.innerText = "🧠 AI 新聞戰略中心";
            }

            document.getElementById('menu-news').className = viewMode === 'news' ? "w-full text-left px-3 py-2 rounded-xl font-bold text-xs text-blue-600 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/40" : "w-full text-left px-3 py-2 rounded-xl font-medium text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors";
            document.getElementById('menu-chain').className = viewMode === 'chain' ? "w-full text-left px-3 py-2 rounded-xl font-bold text-xs text-purple-600 bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-800/40" : "w-full text-left px-3 py-2 rounded-xl font-medium text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors";
            document.getElementById('menu-ainews').className = viewMode === 'ainews' ? "w-full text-left px-3 py-2 rounded-xl font-bold text-xs text-emerald-600 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800/40" : "w-full text-left px-3 py-2 rounded-xl font-medium text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors";

            if(viewMode === 'chain') renderStaticChain(blackwellDefault);
            if(viewMode === 'ainews') switchAiTab(activeAiTabId);
            toggleSidebar();
        }

        // 🎯 核心除錯點：全面改成「全文字安全匹配」，徹底繞開大模型對 ID 字串加法相加時產生的公式污染！
        function showAiBlock(blockType) {
            activeAiBlock = blockType;
            const displayArea = document.getElementById('ai-content-area');
            if (!displayArea) return;

            if (blockType === 'facts') { displayArea.innerText = document.getElementById('shadow-facts').innerText; }
            if (blockType === 'focus') { displayArea.innerText = document.getElementById('shadow-focus').innerText; }
            if (blockType === 'strategy') { displayArea.innerText = document.getElementById('shadow-strategy').innerText; }

            document.querySelectorAll('.sub-block-btn').forEach(function(btn) {
                btn.className = "sub-block-btn px-3 py-1 bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-lg text-[11px] font-medium transition-all shadow-sm border border-gray-300 dark:border-gray-700/50";
            });

            const subColors = { 'facts': 'border-blue-500 text-blue-500 bg-blue-50 dark:bg-blue-950/40', 'focus': 'border-purple-500 text-purple-500 bg-purple-50 dark:bg-purple-950/40', 'strategy': 'border-emerald-500 text-emerald-500 bg-emerald-50 dark:bg-emerald-950/40' };
            const activeSubBtn = document.getElementById('sub-btn-' + blockType);
            if (activeSubBtn) {
                activeSubBtn.className = "sub-block-btn px-3 py-1 font-bold rounded-lg text-[11px] border shadow-md " + subColors[blockType];
            }
        }

        function switchAiTab(subTabId) {
            activeAiTabId = subTabId;
            const aiMapping = {
                'tw': { key: 'ai_news_tw', btn: 'from-green-500 to-emerald-600' },
                'us': { key: 'ai_news_us', btn: 'from-blue-500 to-indigo-600' },
                'global': { key: 'ai_news_global', btn: 'from-purple-500 to-pink-600' }
            };
            
            document.querySelectorAll('.ai-tab-btn').forEach(function(b) {
                b.className = "ai-tab-btn px-4 py-2 rounded-xl font-medium text-xs text-gray-500 dark:text-gray-400 bg-gray-200/70 dark:bg-gray-800/40 border border-gray-300 dark:border-gray-700/50 hover:bg-gray-300/60 dark:hover:bg-gray-800/80 transition-all duration-200 shadow-sm";
            });
            
            const activeCfg = aiMapping[subTabId];
            const activeBtn = document.getElementById('ai-btn-' + subTabId);
            if (activeBtn) activeBtn.className = "ai-tab-btn px-5 py-2 rounded-xl font-bold text-xs bg-gradient-to-r " + activeCfg.btn + " text-white shadow-md border-transparent";

            const tabData = dbData[activeCfg.key] || { "title": "尚未更新", "time": "尚未更新", "text": "暫無日報資料。" };
            document.getElementById('ainews-title').innerText = tabData.title;
            document.getElementById('ainews-time').innerText = "UPDATE: " + tabData.time;
            
            let text = tabData.text || "";
            let cleanText = text.replace(/==+/g, '').trim();
            
            function extractSection(fullText, sectionTitles) {
                for (let i = 0; i < sectionTitles.length; i++) {
                    let title = sectionTitles[i];
                    let startIdx = fullText.indexOf(title);
                    if (startIdx !== -1) {
                        let contentStart = startIdx + title.length;
                        let markers = ["市場事實如下：", "**市場事實如下：**", "市場事實", "**市場事實**", "**今日市場焦點**", "今日市場焦點", "**操盤策略與投資建議**", "操盤策略與投資建議", "聯準會與總經事實", "**聯準會與總經事實**", "科技巨頭動態事實", "**科技巨頭動態事實**"];
                        let endIdx = fullText.length;
                        markers.forEach(function(marker) {
                            let mIdx = fullText.indexOf(marker, contentStart);
                            if (mIdx !== -1 && mIdx < endIdx) { endIdx = mIdx; }
                        });
                        return fullText.substring(contentStart, endIdx).replace(/==+/g, '').trim();
                    }
                }
                return "";
            }

            document.getElementById('shadow-facts').innerText = extractSection(cleanText, ["市場事實如下：", "**市場事實如下：**", "市場事實", "**市場事實**", "聯準會與總經事實", "**聯準會與總經事實**", "科技巨頭動態事實", "**科技巨頭動態事實**"]) || cleanText;
            document.getElementById('shadow-focus').innerText = extractSection(cleanText, ["**今日市場焦點**", "今日市場焦點"]) || "未偵測到今日核心焦點段落。";
            document.getElementById('shadow-strategy').innerText = extractSection(cleanText, ["**操盤策略與投資建議**", "操盤策略與投資建議", "📈 **操盤策略與投資建議**", "操盤策略與行動建議", "**操盤策略與行動建議**"]) || "未偵測到操盤策略方針段落。";

            showAiBlock(activeAiBlock);
        }

        function renderStaticChain(dataList) {
            const container = document.getElementById('chain-flow-container');
            if (!container) return;
            container.innerHTML = "";
            container.className = "grid grid-cols-1 md:grid-cols-4 gap-3 flex-1 overflow-hidden"; 
            dataList.forEach(function(node) {
                let cardsHtml = "";
                node.companies.forEach(function(c) {
                    let idBadge = c.id ? '<span class="font-mono text-[9px] text-gray-400 bg-gray-100 dark:bg-gray-800 px-1 py-0.2 rounded">' + c.id + '</span>' : '';
                    cardsHtml += '<div class="p-2.5 rounded-lg border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-950/40 shadow-sm border-l-4 border-l-purple-500 flex flex-col justify-between mb-2">' +
                                    '<div class="flex justify-between items-center mb-0.5">' +
                                        '<span class="font-bold text-gray-800 dark:text-gray-100 text-xs truncate max-w-[120px]">' + c.name + '</span>' +
                                        idBadge +
                                    '</div>' +
                                    '<p class="text-[10px] text-gray-500 dark:text-gray-400 leading-relaxed">' + c.desc + '</p>' +
                                 '</div>';
                });
                let stepBadge = node.step ? node.step : '•';
                let colDiv = document.createElement('div');
                colDiv.className = "flex flex-col bg-white/60 dark:bg-gray-900/40 border border-gray-200 dark:border-gray-800/80 rounded-xl p-3 shadow-md h-full";
                colDiv.innerHTML = '<div class="flex items-center gap-2 mb-2 border-b border-gray-200 dark:border-gray-800 pb-1.5 flex-shrink-0">' +
                                        '<span class="w-5 h-5 rounded-full bg-gradient-to-r ' + node.color + ' text-white flex items-center justify-center font-bold text-[10px] shadow-sm">' + stepBadge + '</span>' +
                                        '<h3 class="text-xs font-bold text-gray-800 dark:text-gray-100">' + node.stage + ' <span class="text-[10px] font-normal text-gray-400 ml-1">' + node.title + '</span></h3>' +
                                   '</div>' +
                                   '<div class="space-y-2 flex-1 overflow-y-auto pr-1 max-h-[320px] md:max-h-[380px]">' + cardsHtml + '</div>';
                container.appendChild(colDiv);
            });
        }

        async function triggerRealtimeAiAnalysis() {
            const inputVal = document.getElementById('chain-search-input').value.trim();
            const btn = document.getElementById('ai-analyze-btn');
            const brainPanel = document.getElementById('chain-ai-brain');
            const brainText = document.getElementById('brain-comp-text');
            const container = document.getElementById('chain-flow-container');
            if (!inputVal) { alert("請輸入想要剖析的產業或技術主題（例如：低軌衛星、液冷）"); return; }
            if (!btn || !container) return;
            btn.disabled = true;
            btn.className = "px-5 py-3 bg-gray-400 dark:bg-gray-700 text-gray-200 text-sm font-bold rounded-xl shadow-md cursor-not-allowed";
            btn.innerText = "分析中...";
            if (brainPanel) brainPanel.classList.remove('hidden');
            const brainTitle = document.getElementById('brain-comp-name');
            if (brainTitle) brainTitle.innerText = "🔍 正在現場動態生成『" + inputVal + "』的上中下游全球供應鏈...";
            if (brainText) brainText.innerHTML = "<span class='animate-pulse text-purple-500 font-bold text-xs'>⚡ 本地端 Llama 3.1 正在功能推理並編織知識圖譜...</span>";
            try {
                const response = await fetch(NGROK_TUNNEL_URL + "/api/analyze", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Quant-Key': SHENG_SECRET_KEY },
                    body: JSON.stringify({ query: inputVal })
                });
                const resData = await response.json();
                if (!response.ok || !resData.chains) { throw new Error(); }
                if (brainTitle) brainTitle.innerText = "🧠 " + inputVal + " — 全球產業量化核心戰略解讀";
                if (brainText) {
                    brainText.className = "text-xs text-gray-700 dark:text-gray-300 leading-relaxed font-mono whitespace-pre-line";
                    brainText.innerText = resData.summary;
                }
                container.innerHTML = "";
                container.className = "grid grid-cols-1 md:grid-cols-3 gap-3 flex-1 overflow-hidden";
                const colors = { "上游": "from-red-500 to-orange-500", "中游": "from-amber-500 to-yellow-500", "下游": "from-blue-500 to-indigo-500" };
                resData.chains.forEach(function(node, idx) {
                    let cardsHtml = "";
                    node.companies.forEach(function(c) {
                        let idBadge = c.id ? '<span class="font-mono text-[9px] text-gray-400 bg-gray-100 dark:bg-gray-800 px-1 py-0.2 rounded">' + c.id + '</span>' : '';
                        cardsHtml += '<div class="p-2.5 rounded-lg border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-950/40 shadow-sm border-l-4 border-l-purple-500 flex flex-col justify-between mb-2">' +
                                        '<div class="flex justify-between items-center mb-0.5">' +
                                            '<span class="font-bold text-gray-800 dark:text-gray-100 text-xs truncate max-w-[120px]">' + c.name + '</span>' +
                                            idBadge +
                                        '</div>' +
                                        '<p class="text-[10px] text-gray-500 dark:text-gray-400 leading-relaxed">' + c.desc + '</p>' +
                                     '</div>';
                    });
                    const nodeColor = colors[node.stage] || "from-purple-500 to-pink-500";
                    const colDiv = document.createElement('div');
                    colDiv.className = "flex flex-col bg-white/60 dark:bg-gray-900/40 border border-gray-200 dark:border-gray-800/80 rounded-xl p-3 shadow-md h-full";
                    colDiv.innerHTML = '<div class="flex items-center gap-2 mb-2 border-b border-gray-200 dark:border-gray-800 pb-1.5 flex-shrink-0">' +
                                            '<span class="w-5 h-5 rounded-full bg-gradient-to-r ' + nodeColor + ' text-white flex items-center justify-center font-bold text-[10px] shadow-sm">' + (idx + 1) + '</span>' +
                                            '<h3 class="text-xs font-bold text-gray-800 dark:text-gray-100">' + node.stage + ' <span class="text-[10px] font-normal text-gray-400 ml-1">' + node.title + '</span></h3>' +
                                        '</div>' +
                                        '<div class="space-y-2 flex-1 overflow-y-auto pr-1 max-h-[320px] md:max-h-[380px]">' + cardsHtml + '</div>';
                    container.appendChild(colDiv);
                });
            } catch (err) {
                if (brainText) brainText.innerHTML = "<span class='text-red-500 font-bold text-xs'>❌ 數據串接異常：請確認本機 api_server.py 是否正常開機運作。</span>";
            } finally {
                btn.disabled = false;
                btn.className = "px-5 py-3 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-xl shadow-md transition duration-200";
                btn.innerText = "即時 AI 分析";
            }
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            const themes = {
                'tw': { title: "📊 台股大數據資料來源", btn: 'from-green-500 to-emerald-600' },
                'us': { title: "🦅 美股科技巨頭晚報資料來源", btn: 'from-blue-500 to-indigo-600' },
                'global': { title: "🌍 國際政經與環球情報資料來源", btn: 'from-purple-500 to-pink-600' }
            };
            const mainPanel = document.getElementById('main-panel');
            if (!mainPanel) return;
            document.querySelectorAll('.tab-btn').forEach(function(b) {
                b.className = "tab-btn px-4 py-2 rounded-xl font-medium text-xs text-gray-500 dark:text-gray-400 bg-gray-200/70 dark:bg-gray-800/40 border border-gray-300 dark:border-gray-700/50 hover:bg-gray-300/60 dark:hover:bg-gray-800/80 transition-all duration-200";
            });
            const t = themes[tabId] || themes['tw'];
            const activeBtn = document.getElementById('btn-' + tabId);
            if (activeBtn) activeBtn.className = "tab-btn px-5 py-2 rounded-xl font-bold text-xs bg-gradient-to-r " + t.btn + " text-white shadow-md border-transparent";
            mainPanel.className = "bg-white/90 dark:bg-gray-900/70 backdrop-blur-xl p-4 md:p-5 rounded-xl border border-gray-200 dark:border-gray-800/80 shadow-md transition-all duration-300 flex flex-col h-[calc(100vh-210px)] overflow-hidden";
            const titleEl = document.getElementById('panel-title');
            const timeEl = document.getElementById('panel-time');
            const tabData = dbData[tabId] || { "time": "尚未更新", "data": [] };
            if (titleEl) titleEl.innerText = t.title;
            if (timeEl) timeEl.innerText = "UPDATE: " + tabData.time;
            const container = document.getElementById('link-list');
            if (!container) return;
            container.innerHTML = "";
            container.className = "space-y-2 flex-1 overflow-y-auto pr-1";
            let dataList = tabData.data || [];
            dataList.slice(0, 15).forEach(function(item) {
                const li = document.createElement('li');
                li.className = "p-2.5 bg-gray-50/50 dark:bg-gray-800/20 rounded-lg border border-gray-200 dark:border-gray-700/30 text-xs flex flex-col gap-0.5 hover:border-gray-300 dark:hover:bg-gray-600 transition-colors shadow-sm group";
                li.innerHTML = '<div class="text-gray-700 dark:text-gray-300 font-medium truncate">📌 新聞：' + item.title + '</div>' +
                               '<a href="' + item.url + '" target="_blank" class="text-[10px] font-mono text-gray-400 block truncate hover:text-purple-400 transition-colors">' + item.url + '</a>';
                container.appendChild(li);
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            switchTab('tw');
        });
    </script>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-hidden">
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 dark:bg-black/70 backdrop-blur-sm z-40 hidden"></div>
    
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-56 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-50 transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center"><h2 class="text-base font-black font-mono text-purple-600">QUANT_MENU</h2></div>
        <nav class="flex-1 p-3 space-y-1">
            <button id="menu-news" onclick="changeView('news')" class="w-full text-left px-3 py-2 rounded-xl font-bold text-xs text-blue-600 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/40">📊 新聞情報中心</button>
            <button id="menu-chain" onclick="changeView('chain')" class="w-full text-left px-3 py-2 rounded-xl font-medium text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors">🔗 AI 供應鏈地圖</button>
            <button id="menu-ainews" onclick="changeView('ainews')" class="w-full text-left px-3 py-2 rounded-xl font-medium text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors">🧠 AI 新聞戰略中心</button>
        </nav>
        <div class="p-3 border-t border-gray-200 dark:border-gray-800 text-[10px] text-gray-400 font-mono text-center">v1.7.8 Fixed</div>
    </aside>

    <div class="w-full flex justify-between items-center px-4 py-2 border-b border-gray-200 dark:border-gray-800/80 bg-white/70 dark:bg-gray-900/40 backdrop-blur-md sticky top-0 z-30">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="p-1.5 rounded-lg border border-gray-300 dark:border-gray-700 text-xs hover:bg-gray-100 dark:hover:bg-gray-800/50">☰</button>
            <div class="inline-flex items-center gap-1.5 px-2.5 py-0.5 bg-purple-500/10 border border-purple-500/30 rounded-full text-purple-500 dark:text-purple-400 text-[10px] font-mono">
                <span class="w-1.5 h-1.5 rounded-full bg-purple-500 pulse-light"></span>QUANT_CORE_LIVE
            </div>
        </div>
        <button onclick="toggleDarkMode()" id="mode-text" class="px-2.5 py-1 rounded-lg border border-gray-300 dark:border-gray-700 text-[11px] hover:bg-gray-100 dark:hover:bg-gray-800/50">亮色 ☀️</button>
    </div>

    <div class="max-w-5xl mx-auto w-full px-4 py-3 flex-1 flex flex-col justify-start overflow-hidden">
        <header class="text-center mb-4 flex-shrink-0">
            <h1 id="page-title-header" class="text-xl font-black font-mono tracking-wider text-gray-800 dark:text-transparent dark:bg-clip-text dark:bg-gradient-to-r dark:from-gray-100 dark:via-gray-200 dark:to-gray-300">📊 新聞情報中心</h1>
        </header>

        <div id="news-section" class="space-y-4 flex-1 flex flex-col overflow-hidden">
            <nav class="flex justify-center space-x-2 mb-2 flex-shrink-0">
                <button id="btn-tw" onclick="switchTab('tw')" class="tab-btn">📊 台股大數據</button>
                <button id="btn-us" onclick="switchTab('us')" class="tab-btn">🦅 美股焦點</button>
                <button id="btn-global" onclick="switchTab('global')" class="tab-btn">🌍 國際政經</button>
            </nav>
            <main id="main-panel" class="p-4 rounded-xl min-h-[300px] flex-1 flex flex-col overflow-hidden">
                <div class="flex justify-between border-b border-gray-200 dark:border-gray-200 pb-2 mb-3 flex-shrink-0">
                    <h2 id="panel-title" class="text-xs font-bold text-gray-400">載入中...</h2>
                    <span id="panel-time" class="text-[10px] font-mono text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-950/50 px-2 py-0.5 rounded">--</span>
                </div>
                <ul id="link-list"></ul>
            </main>
        </div>

        <div id="chain-section" class="space-y-3 hidden flex-1 overflow-hidden">
            <div class="max-w-xl mx-auto flex gap-2 flex-shrink-0 w-full">
                <input type="text" id="chain-search-input" placeholder="輸入你想探索的全球產業 (如：低軌衛星、防災科技、液冷)..." 
                       class="flex-1 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-800 rounded-xl focus:outline-none focus:ring-1 focus:ring-purple-500 text-xs text-gray-700 dark:text-gray-300">
                <button id="ai-analyze-btn" onclick="triggerRealtimeAiAnalysis()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold rounded-xl shadow-md transition duration-200">即時 AI 分析</button>
            </div>
            <div id="chain-ai-brain" class="hidden p-3 bg-gradient-to-r from-purple-900/10 to-indigo-900/10 border border-purple-500/20 rounded-xl flex-shrink-0">
                <div class="text-purple-500 dark:text-purple-400 font-bold mb-1 text-[11px] font-mono">🧠 <span id="brain-comp-name"></span></div>
                <p id="brain-comp-text" class="text-[11px] leading-normal font-mono text-gray-600 dark:text-gray-300 whitespace-pre-line"></p>
            </div>
            <div id="chain-flow-container" class="flex-1 overflow-y-auto"></div>
        </div>

        <div id="ainews-section" class="hidden flex-1 flex-col overflow-hidden h-full">
            <nav class="flex justify-center space-x-2 mb-2 flex-shrink-0">
                <button id="ai-btn-tw" onclick="switchAiTab('tw')" class="ai-tab-btn">📊 台股戰略</button>
                <button id="ai-btn-us" onclick="switchAiTab('us')" class="ai-tab-btn">🦅 美股焦點</button>
                <button id="ai-btn-global" onclick="switchAiTab('global')" class="ai-tab-btn">🌍 國際政經</button>
            </nav>

            <nav class="flex justify-center space-x-2 mb-2 flex-shrink-0 bg-gray-900/40 p-1 rounded-xl max-w-sm mx-auto border border-gray-800/60">
                <button id="sub-btn-facts" onclick="showAiBlock('facts')" class="sub-block-btn px-3 py-1 text-gray-400 rounded-lg text-[11px]">📋 市場事實</button>
                <button id="sub-btn-focus" onclick="showAiBlock('focus')" class="sub-block-btn px-3 py-1 text-gray-400 rounded-lg text-[11px]">🔥 重要焦點</button>
                <button id="sub-btn-strategy" onclick="showAiBlock('strategy')" class="sub-block-btn px-3 py-1 text-gray-400 rounded-lg text-[11px]">⚡ 操盤方針</button>
            </nav>

            <div class="flex justify-between border-b border-gray-200 dark:border-gray-800 pb-1.5 mb-2 flex-shrink-0">
                <h2 id="ainews-title" class="text-xs font-bold text-gray-400">載入中...</h2>
                <span id="ainews-time" class="text-[10px] font-mono text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-950/50 px-2 py-0.5 rounded border border-gray-200 dark:border-gray-800">--</span>
            </div>
            
            <div class="flex flex-col bg-white/60 dark:bg-gray-900/40 border border-gray-200 dark:border-gray-800/80 rounded-xl p-4 shadow-md h-[calc(100vh-210px)] overflow-hidden">
                <div id="ai-content-area" class="flex-1 overflow-y-auto font-mono text-[13px] text-gray-700 dark:text-gray-300 leading-relaxed whitespace-pre-line pr-1 tracking-wide pb-6 selection:bg-purple-500/30">
                    載入中...
                </div>
            </div>

            <div id="shadow-facts" class="hidden"></div>
            <div id="shadow-focus" class="hidden"></div>
            <div id="shadow-strategy" class="hidden"></div>
        </div>

    </div>
    <footer class="py-2 text-center text-gray-400 dark:text-gray-600 text-[9px] font-mono uppercase flex-shrink-0">// ONE_PAGE_DASHBOARD_MODE // LONE_LLAMA_AGENT_V1</footer>
</body>
