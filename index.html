                    return;
                }
                
                tabData.links.forEach((link, idx) => {

                    li.className = "p-4 bg-gray-800 rounded-lg hover:bg-gray-700 transition duration-200";

                            <span>${link}</span>
                        </a>
                    `;
                    listContainer.appendChild(li);
                });
            }
