                                 class="p-4 rounded-xl border transition-all duration-300 cursor-pointer hover:border-purple-500/50 hover:bg-purple-50/30 dark:hover:bg-purple-950/20 group flex justify-between items-center ${highlightClass}">
                                <span class="font-bold text-gray-800 dark:text-gray-200 group-hover:text-purple-500">${c.name}</span>
                                <span class="font-mono text-[11px] text-gray-400 bg-gray-200/50 dark:bg-gray-800 px-2 py-0.5 rounded">${c.id}</span>
                            </div>
                        `;
                    });

                    stepDiv.innerHTML = `
                        <div class="flex items-center gap-3 mb-4 border-b border-gray-200 dark:border-gray-800 pb-2">
                            <span class="w-7 h-7 rounded-full bg-gradient-to-r ${node.color} text-white flex items-center justify-center font-mono font-bold text-xs">${node.step}</span>
                            <h3 class="text-base font-bold text-gray-800 dark:text-gray-100">${node.name} <span class="text-xs font-mono font-normal text-gray-400 ml-2">${node.en}</span></h3>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">${cardsHtml}</div>
                    `;
                    container.appendChild(stepDiv);
                });
            }

            function switchTab(tabId) {
                activeTabId = tabId;
                const themes = {
                    'tw': { btn: 'from-green-500 to-emerald-600', border: 'border-emerald-500/30', text: 'text-emerald-400', badge: 'bg-emerald-950 text-emerald-300 border-emerald-500/40' },
                    'us': { btn: 'from-blue-500 to-indigo-600', border: 'border-blue-500/30', text: 'text-blue-400', badge: 'bg-blue-950 text-blue-300 border-blue-500/40' },
                    'global': { btn: 'from-purple-500 to-pink-600', border: 'border-purple-500/30', text: 'text-purple-400', badge: 'bg-purple-950 text-purple-300 border-purple-500/40' }
                };
                document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-5 py-2.5 rounded-xl font-medium transition-all duration-300 bg-gray-200/60 dark:bg-gray-800/40 text-gray-600 dark:text-gray-400 border border-gray-300 dark:border-gray-700/50");
                const t = themes[tabId];
                document.getElementById('btn-'+tabId).className = `tab-btn px-6 py-2.5 rounded-xl font-bold transition-all duration-300 bg-gradient-to-r ${t.btn} text-white shadow-lg`;
                const tabData = dbData[tabId];
                document.getElementById('main-panel').className = `bg-white/80 dark:bg-gray-900/60 backdrop-blur-xl p-6 rounded-2xl border dark:${t.border}`;
                document.getElementById('panel-title').innerText = tabData.title + "資料來源";
                document.getElementById('panel-time').innerText = "SYSTEM UPDATE: " + tabData.time;
                const container = document.getElementById('link-list');
                container.innerHTML = "";
                (tabData.data || []).forEach((item, idx) => {
                    const li = document.createElement('li');
                    li.className = "p-4 bg-gray-50/50 dark:bg-gray-800/30 rounded-xl border border-gray-200 dark:border-gray-700/30 flex flex-col gap-1 text-sm";
                    li.innerHTML = `<div>📌 新聞：${item.title}</div><a href="${item.url}" target="_blank" class="text-xs font-mono text-gray-400 truncate hover:${t.text}">${item.url}</a>`;
                    container.appendChild(li);
                });
            }

            function toggleDarkMode() {
                const html = document.documentElement;
                if (html.classList.contains('dark')) {
                    html.classList.remove('dark'); document.body.className = "theme-light text-gray-900 min-h-screen flex flex-col justify-between";
                } else {
                    html.classList.add('dark'); document.body.className = "theme-dark text-gray-100 min-h-screen flex flex-col justify-between selection:bg-blue-500/30";
                }
                if(activeView === 'news') switchTab(activeTabId);
            }

            function toggleSidebar() {
                const s = document.getElementById('sidebar');
                s.classList.toggle('-translate-x-full');
                document.getElementById('sidebar-backdrop').classList.toggle('hidden');
            }
            window.onload = () => switchTab('tw');
        </script>
    </head>
    <body class="theme-dark text-gray-100 min-h-screen flex flex-col justify-between">
        <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden"></div>
        <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-50 transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
            <div class="p-6 border-b dark:border-gray-800 flex justify-between items-center"><h2 class="text-xl font-black font-mono text-blue-500">QUANT_MENU</h2></div>
            <nav class="flex-1 p-4 space-y-2">
                <button id="menu-news" onclick="changeView('news')" class="w-full text-left px-4 py-3 rounded-xl font-bold text-blue-500 bg-blue-50 dark:bg-blue-900/20">📊 新聞情報中心</button>
                <button id="menu-chain" onclick="changeView('chain')" class="w-full text-left px-4 py-3 rounded-xl font-bold text-gray-400">🔗 AI 供應鏈地圖</button>
            </nav>
        </aside>

        <div class="w-full flex justify-between items-center px-6 py-3 border-b dark:border-gray-800/80 bg-white/70 dark:bg-gray-900/40 backdrop-blur-md sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 rounded-lg border dark:border-gray-700 bg-white/80 dark:bg-gray-800/60 text-gray-700 dark:text-gray-300">☰</button>
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded-full text-emerald-400 text-xs font-mono"><span class="w-2 h-2 rounded-full bg-emerald-500 pulse-light"></span>QUANT_CORE_ALIVE</div>
            </div>
            <button onclick="toggleDarkMode()" id="mode-text" class="px-3 py-1.5 rounded-lg border dark:border-gray-700 text-xs text-gray-700 dark:text-gray-300">切換亮色模式 ☀️</button>
        </div>

        <div class="max-w-5xl mx-auto w-full p-4 md:p-8 flex-1 mt-2">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-extrabold tracking-wider font-mono">QUANT_ROOM <span class="text-blue-500 font-light">v1.7</span></h2>
                <p class="text-xs text-gray-500 font-mono mt-1 uppercase tracking-widest">Live Dynamic Inference Hub</p>
            </header>

            <div id="news-section" class="space-y-6">
                <nav class="flex justify-center space-x-2 mb-6">
                    <button id="btn-tw" onclick="switchTab('tw')" class="tab-btn px-5 py-2.5 rounded-xl font-medium">📊 台股大數據</button>
                    <button id="btn-us" onclick="switchTab('us')" class="tab-btn px-5 py-2.5 rounded-xl font-medium">🦅 美股焦點</button>
                    <button id="btn-global" onclick="switchTab('global')" class="tab-btn px-5 py-2.5 rounded-xl font-medium">🌍 國際政經</button>
                </nav>
                <main id="main-panel" class="p-6 rounded-2xl shadow-2xl min-h-[400px]">
                    <div class="flex justify-between border-b dark:border-gray-800 pb-3 mb-4"><h2 id="panel-title" class="text-xl font-bold">載入中...</h2><span id="panel-time" class="text-xs font-mono text-gray-500">SYSTEM UPDATE: --</span></div>
                    <ul id="link-list" class="space-y-3"></ul>
                </main>
            </div>

            <div id="chain-section" class="space-y-6 hidden">
                <div class="max-w-xl mx-auto flex gap-2">
                    <input type="text" id="chain-search-input" placeholder="輸入概念股、代號或組件 (如: 台積電, 3324, 液冷)..." 
                           class="flex-1 px-4 py-3 bg-white dark:bg-gray-900 border dark:border-gray-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm text-gray-700 dark:text-gray-300 shadow-md">
                    <button onclick="triggerRealtimeAiAnalysis()" class="px-5 py-3 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-xl shadow-md transition duration-200">即時 AI 分析</button>
                </div>

                <div id="chain-ai-brain" class="hidden p-5 bg-gradient-to-r from-purple-900/10 to-indigo-900/10 border border-purple-500/30 rounded-2xl shadow-xl">
                    <div class="text-purple-400 font-bold mb-2 text-sm font-mono">🧠 <span id="brain-comp-name"></span></div>
                    <p id="brain-comp-text" class="text-xs md:text-sm text-gray-300 leading-relaxed font-mono whitespace-pre-line"></p>
                </div>

                <div id="chain-flow-container" class="space-y-4"></div>
            </div>
        </div>
        <footer class="mt-16 mb-4 text-center text-gray-600 text-xs font-mono uppercase">// REALTIME_TUNNEL_MODE // OLLAMA_SERVER_ACTIVE</footer>
    </body>
    </html>
